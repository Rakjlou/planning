<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retroplanning Album — Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.15/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15/dist/cdn.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-cod-dark: #0f0f0f;
      --color-cod-bg: #1a1a1a;
      --color-cod-card: #242424;
      --color-cod-border: #333;
      --color-cod-text: #e0e0e0;
      --color-cod-muted: #888;
      --color-cod-accent: #f59e0b;
      --color-cod-green: #22c55e;
      --color-cod-red: #ef4444;
      --color-cod-orange: #f97316;
      --color-cod-blue: #3b82f6;
    }

    body { background: var(--color-cod-dark); color: var(--color-cod-text); }

    .phase-card { transition: all 0.2s ease; }
    .phase-card:hover { border-color: var(--color-cod-accent); }
    .task-done { text-decoration: line-through; opacity: 0.5; }
    .progress-bar { transition: width 0.5s ease; }

    .urgency-glow-red { box-shadow: inset 3px 0 0 var(--color-cod-red); }
    .urgency-glow-orange { box-shadow: inset 3px 0 0 var(--color-cod-orange); }
    .urgency-glow-yellow { box-shadow: inset 3px 0 0 var(--color-cod-accent); }
    .urgency-glow-green { box-shadow: inset 3px 0 0 var(--color-cod-green); }
    .urgency-glow-done { box-shadow: inset 3px 0 0 var(--color-cod-green); opacity: 0.6; }

    .custom-check {
      width: 20px; height: 20px; min-width: 20px;
      border: 2px solid var(--color-cod-muted);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
      cursor: pointer; background: transparent;
    }
    .custom-check:hover { border-color: var(--color-cod-accent); }
    .custom-check.checked {
      background: var(--color-cod-green);
      border-color: var(--color-cod-green);
    }
    .custom-check .check-icon { opacity: 0; transition: opacity 0.2s ease; }
    .custom-check.checked .check-icon { opacity: 1; }

    .task-row { transition: opacity 0.3s ease; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--color-cod-dark); }
    ::-webkit-scrollbar-thumb { background: var(--color-cod-border); border-radius: 4px; }
  </style>
</head>

<body class="min-h-screen font-sans" x-data="dashboard()" x-init="loadData()" @keydown.window.escape="cancelAllEditing()" @click="cancelAllEditing()">

  <!-- ══════════ HEADER ══════════ -->
  <header class="sticky top-0 z-50 bg-cod-dark/95 backdrop-blur border-b border-cod-border px-6 py-3" @click.stop>
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-6">
        <h1 class="text-xl font-bold tracking-tight text-white">Retroplanning Album</h1>
        <div class="flex items-center gap-3" x-show="tasks.length > 0">
          <div class="w-40 h-2 bg-cod-card rounded-full overflow-hidden">
            <div class="h-full rounded-full progress-bar"
                 :class="globalProgress === 100 ? 'bg-cod-green' : 'bg-cod-accent'"
                 :style="'width:' + globalProgress + '%'"></div>
          </div>
          <span class="text-sm font-bold text-white" x-text="globalProgress + '%'"></span>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <template x-if="releaseDate">
          <div class="text-right text-sm">
            <span class="text-cod-accent font-semibold" x-text="formattedReleaseDate"></span>
            <span class="text-cod-muted mx-1">—</span>
            <span class="font-mono" :class="daysLeft < 30 ? 'text-cod-red' : daysLeft < 90 ? 'text-cod-orange' : 'text-cod-green'"
                  x-text="'J-' + daysLeft"></span>
          </div>
        </template>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-6">

    <!-- ══════════ EMPTY STATE ══════════ -->
    <div x-show="phases.length === 0" class="text-center py-16" @click.stop>
      <div class="text-cod-muted text-lg mb-4">Aucune phase créée</div>
      <p class="text-cod-muted text-sm mb-6">Commencez par créer une phase, puis ajoutez-y des tâches.</p>
      <button @click.stop="cancelAllEditing(); creatingPhase = true; newPhase = { name: '', period: '', milestones: '' }" class="bg-cod-accent text-cod-dark px-4 py-2 rounded text-sm font-semibold hover:brightness-110 transition">
        + Nouvelle phase
      </button>
    </div>

    <!-- ══════════ DASHBOARD ══════════ -->

    <!-- Légende -->
    <div class="flex items-center gap-4 mb-4 text-xs text-cod-muted" x-show="phases.length > 0">
      <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-sm bg-cod-red"></span> En retard ou &lt;14j</span>
      <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-sm bg-cod-orange"></span> 14–30j</span>
      <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-sm bg-cod-accent"></span> 30–60j</span>
      <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-sm bg-cod-green"></span> &gt;60j ou terminé</span>
      <span class="flex items-center gap-1.5"><span class="text-cod-accent">◆</span> Décision à prendre</span>
    </div>

    <!-- Phase cards -->
    <div class="space-y-3">
      <template x-for="phase in phases" :key="phase.id">
        <div class="bg-cod-card rounded-lg border border-cod-border overflow-hidden transition-all duration-200"
             :class="phaseUrgencyGlow(phase.id)" @click.stop>

          <!-- Phase header row -->
          <div class="px-4 py-3 cursor-pointer select-none flex items-center gap-2 transition"
               :class="editingPhase === phase.id ? 'bg-cod-accent/5' : ''"
               @click="if (editingPhase !== phase.id) togglePhase(phase.id)">
            <div class="flex items-center gap-4 flex-1 min-w-0">
              <span class="text-cod-muted text-xs transition-transform duration-200"
                    :class="openPhases.includes(phase.id) ? 'rotate-90' : ''" style="display:inline-block">▶</span>

              <div class="w-56 shrink-0">
                <!-- Name: span or input -->
                <div x-show="editingPhase !== phase.id" class="text-sm font-semibold text-white" x-text="phase.name"></div>
                <input x-show="editingPhase === phase.id" type="text" x-model="editPhaseData.name" @click.stop
                       class="text-sm font-semibold bg-transparent border-b border-cod-accent/40 outline-none w-full py-0.5 text-white focus:border-cod-accent transition-colors">
                <!-- Period: span or input -->
                <div x-show="editingPhase !== phase.id" class="text-xs text-cod-muted" x-text="phase.period"></div>
                <input x-show="editingPhase === phase.id" type="text" x-model="editPhaseData.period" @click.stop
                       class="text-xs bg-transparent border-b border-cod-border/60 outline-none w-full py-0.5 text-cod-muted focus:border-cod-accent/40 transition-colors">
              </div>

              <!-- Milestones input (only when editing, replaces next-task area) -->
              <div x-show="editingPhase === phase.id" class="flex-1 min-w-0" @click.stop>
                <input type="text" x-model="editPhaseData.milestones" placeholder="Jalons"
                       class="text-sm bg-transparent border-b border-cod-border/60 outline-none w-full py-0.5 text-cod-muted focus:border-cod-accent/40 transition-colors">
              </div>

              <!-- Next task + countdown + decisions + progress (hidden when editing) -->
              <template x-if="editingPhase !== phase.id">
                <div class="flex items-center gap-2 flex-1 min-w-0">
                  <div class="flex-1 min-w-0">
                    <template x-if="nextTask(phase.id)">
                      <div class="flex items-center gap-2">
                        <span class="text-xs text-cod-muted">→</span>
                        <span class="text-sm truncate" x-text="nextTask(phase.id).text"></span>
                        <span class="text-xs font-mono shrink-0 ml-auto"
                              :class="urgencyColor(phase.id)"
                              x-text="formatDate(nextTask(phase.id).deadlineDate)"></span>
                      </div>
                    </template>
                    <template x-if="!nextTask(phase.id)">
                      <span class="text-sm text-cod-green" x-text="phaseTasks(phase.id).length ? '✓ Terminé' : 'Aucune tâche'"></span>
                    </template>
                  </div>

                  <div class="shrink-0 w-16 text-right">
                    <template x-if="nextTask(phase.id)">
                      <span class="text-xs font-mono font-bold px-2 py-0.5 rounded"
                            :class="urgencyBadge(phase.id)"
                            x-text="phaseCountdown(phase.id)"></span>
                    </template>
                  </div>

                  <!-- Decision counter -->
                  <template x-if="phaseOpenDecisions(phase.id) > 0">
                    <span class="shrink-0 text-xs font-mono text-cod-accent px-1.5 py-0.5 bg-cod-accent/10 rounded"
                          x-text="'◆ ' + phaseOpenDecisions(phase.id)"></span>
                  </template>

                  <div class="shrink-0 flex items-center gap-2 w-24">
                    <div class="flex-1 h-1.5 bg-cod-dark rounded-full overflow-hidden">
                      <div class="h-full rounded-full progress-bar"
                           :class="phaseProgress(phase.id) === 100 ? 'bg-cod-green' : 'bg-cod-accent'"
                           :style="'width:' + phaseProgress(phase.id) + '%'"></div>
                    </div>
                    <span class="text-xs text-cod-muted w-8 text-right" x-text="phaseStats(phase.id)"></span>
                  </div>
                </div>
              </template>
            </div>

            <!-- Phase actions: edit/delete in read mode, save/cancel/delete in edit mode -->
            <div class="flex items-center gap-0.5 shrink-0" @click.stop>
              <template x-if="editingPhase !== phase.id">
                <div class="flex items-center gap-0.5">
                  <button @click="cancelAllEditing(); editingPhase = phase.id; editPhaseData = {...phase}"
                          class="text-cod-muted hover:text-cod-accent p-1 rounded-full hover:bg-cod-accent/10 transition-colors" title="Modifier">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                  </button>
                  <template x-if="confirmingDelete !== 'phase-' + phase.id">
                    <button @click="confirmingDelete = 'phase-' + phase.id"
                            class="text-cod-muted hover:text-cod-red p-1 rounded-full hover:bg-cod-red/10 transition-colors" title="Supprimer">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                  </template>
                  <template x-if="confirmingDelete === 'phase-' + phase.id">
                    <div class="flex items-center gap-0.5 text-xs">
                      <span class="text-cod-red font-medium">Sûr ?</span>
                      <button @click="deletePhase(phase.id)" class="text-cod-red hover:text-red-400 p-1 rounded-full hover:bg-cod-red/10 transition-colors" title="Confirmer">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                      </button>
                      <button @click="confirmingDelete = null" class="text-cod-muted hover:text-white p-1 rounded-full hover:bg-cod-border/50 transition-colors" title="Annuler">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                      </button>
                    </div>
                  </template>
                </div>
              </template>
              <template x-if="editingPhase === phase.id">
                <div class="flex items-center gap-0.5">
                  <button @click="savePhase(phase.id)" class="text-cod-muted hover:text-cod-green p-1 rounded-full hover:bg-cod-green/10 transition-colors" title="Enregistrer">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                  </button>
                  <button @click="editingPhase = null" class="text-cod-muted hover:text-white p-1 rounded-full hover:bg-cod-border/50 transition-colors" title="Annuler">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                  </button>
                  <template x-if="confirmingDelete !== 'phase-' + phase.id">
                    <button @click="confirmingDelete = 'phase-' + phase.id"
                            class="text-cod-muted hover:text-cod-red p-1 rounded-full hover:bg-cod-red/10 transition-colors" title="Supprimer">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                  </template>
                  <template x-if="confirmingDelete === 'phase-' + phase.id">
                    <div class="flex items-center gap-0.5 text-xs">
                      <span class="text-cod-red font-medium">Sûr ?</span>
                      <button @click="deletePhase(phase.id)" class="text-cod-red hover:text-red-400 p-1 rounded-full hover:bg-cod-red/10 transition-colors" title="Confirmer">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                      </button>
                      <button @click="confirmingDelete = null" class="text-cod-muted hover:text-white p-1 rounded-full hover:bg-cod-border/50 transition-colors" title="Annuler">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                      </button>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>

          <!-- Task list (expandable) -->
          <div x-show="openPhases.includes(phase.id)" x-collapse>
            <div class="border-t border-cod-border px-4 py-2 space-y-0.5 bg-cod-dark/30">
              <template x-for="task in phaseTasks(phase.id)" :key="task.id">
                <div class="flex items-start gap-3 rounded px-2 py-1.5 transition group cursor-pointer task-row"
                     :class="{
                       'opacity-40': task.done,
                       'bg-cod-accent/5': editingTask === task.id,
                       'hover:bg-cod-card/50': editingTask !== task.id
                     }"
                     @click="if (editingTask !== task.id) { cancelAllEditing(); editingTask = task.id; editTaskData = JSON.parse(JSON.stringify(task)); }">
                  <button @click.stop="toggleTask(task)" class="custom-check mt-0.5" :class="task.done ? 'checked' : ''">
                    <svg class="check-icon w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                  </button>
                  <div class="flex-1 min-w-0">
                    <!-- Task text: span in read mode, input in edit mode -->
                    <div class="flex items-center gap-2">
                      <span x-show="editingTask !== task.id" class="text-sm" :class="task.done ? 'line-through' : ''" x-text="task.text"></span>
                      <input x-show="editingTask === task.id" type="text" x-model="editTaskData.text" @click.stop
                             class="text-sm bg-transparent border-b border-cod-accent/40 outline-none w-full py-0.5 text-cod-text focus:border-cod-accent transition-colors">
                    </div>
                    <!-- Notes: span in read mode, input in edit mode -->
                    <div x-show="editingTask !== task.id && task.notes && !task.done" class="text-xs text-cod-muted mt-0.5" x-text="task.notes"></div>
                    <input x-show="editingTask === task.id" type="text" x-model="editTaskData.notes" placeholder="Notes" @click.stop
                           class="text-xs bg-transparent border-b border-cod-border/60 outline-none w-full py-0.5 mt-0.5 text-cod-muted focus:border-cod-accent/40 transition-colors">
                    <!-- Decisions: same pill/dropdown pattern in both modes -->
                    <template x-if="editingTask !== task.id">
                      <div>
                        <template x-for="(dec, di) in (task.decisions || [])" :key="'dn'+di">
                          <div class="relative mt-0.5" x-show="!task.done" x-data="{ menuOpen: false }" @click.stop>
                            <button @click="menuOpen = !menuOpen"
                                    class="text-xs cursor-pointer flex items-center gap-1 rounded px-1.5 py-0.5 border transition"
                                    :class="{
                                      'bg-cod-accent/15 text-cod-accent border-cod-accent/30': dec.status === 'open',
                                      'bg-cod-blue/15 text-cod-blue border-cod-blue/30': dec.status === 'discussed',
                                      'bg-cod-green/15 text-cod-green border-cod-green/30': dec.status === 'decided'
                                    }">
                              <span x-text="decisionIcon(dec.status)"></span>
                              <span x-text="dec.notes || 'Décision ' + (di+1)"></span>
                            </button>
                            <div x-show="menuOpen" @click.outside="menuOpen = false"
                                 class="absolute left-0 top-full mt-1 z-50 bg-cod-card border border-cod-border rounded shadow-lg py-1 min-w-[120px]">
                              <template x-for="opt in [{v:'open',l:'Ouvert',i:'◇'},{v:'discussed',l:'Discuté',i:'◈'},{v:'decided',l:'Décidé',i:'◆'}]">
                                <button @click="updateTaskDecision(task, di, opt.v); menuOpen = false"
                                        class="w-full text-left text-xs px-3 py-1.5 flex items-center gap-2 hover:bg-cod-dark/50 transition"
                                        :class="{
                                          'text-cod-accent': opt.v === 'open',
                                          'text-cod-blue': opt.v === 'discussed',
                                          'text-cod-green': opt.v === 'decided'
                                        }">
                                  <span x-text="opt.i"></span>
                                  <span x-text="opt.l"></span>
                                </button>
                              </template>
                            </div>
                          </div>
                        </template>
                      </div>
                    </template>
                    <template x-if="editingTask === task.id">
                      <div @click.stop>
                        <template x-for="(dec, di) in (editTaskData.decisions || [])" :key="'de'+di">
                          <div class="relative mt-0.5" x-data="{ menuOpen: false }">
                            <div class="flex items-center gap-1.5">
                              <button @click="menuOpen = !menuOpen"
                                      class="text-xs cursor-pointer flex items-center gap-1 rounded px-1.5 py-0.5 border transition shrink-0"
                                      :class="{
                                        'bg-cod-accent/15 text-cod-accent border-cod-accent/30': dec.status === 'open',
                                        'bg-cod-blue/15 text-cod-blue border-cod-blue/30': dec.status === 'discussed',
                                        'bg-cod-green/15 text-cod-green border-cod-green/30': dec.status === 'decided'
                                      }">
                                <span x-text="decisionIcon(dec.status)"></span>
                                <span x-text="dec.status === 'open' ? 'Ouvert' : dec.status === 'discussed' ? 'Discuté' : 'Décidé'"></span>
                              </button>
                              <input type="text" x-model="editTaskData.decisions[di].notes" placeholder="Notes décision"
                                     class="flex-1 text-xs bg-transparent border-b border-cod-border/60 outline-none py-0.5 text-cod-muted focus:border-cod-accent/40 transition-colors">
                              <button @click="editTaskData.decisions.splice(di, 1)"
                                      class="text-cod-muted hover:text-cod-red text-xs px-1" title="Supprimer la décision">✕</button>
                            </div>
                            <div x-show="menuOpen" @click.outside="menuOpen = false"
                                 class="absolute left-0 top-full mt-1 z-50 bg-cod-card border border-cod-border rounded shadow-lg py-1 min-w-[120px]">
                              <template x-for="opt in [{v:'open',l:'Ouvert',i:'◇'},{v:'discussed',l:'Discuté',i:'◈'},{v:'decided',l:'Décidé',i:'◆'}]">
                                <button @click="editTaskData.decisions[di].status = opt.v; menuOpen = false"
                                        class="w-full text-left text-xs px-3 py-1.5 flex items-center gap-2 hover:bg-cod-dark/50 transition"
                                        :class="{
                                          'text-cod-accent': opt.v === 'open',
                                          'text-cod-blue': opt.v === 'discussed',
                                          'text-cod-green': opt.v === 'decided'
                                        }">
                                  <span x-text="opt.i"></span>
                                  <span x-text="opt.l"></span>
                                </button>
                              </template>
                            </div>
                          </div>
                        </template>
                        <button @click="editTaskData.decisions = [...(editTaskData.decisions || []), { status: 'open', notes: '' }]"
                                class="text-xs text-cod-accent hover:text-cod-accent/80 mt-1">+ Décision</button>
                      </div>
                    </template>
                  </div>
                  <!-- Date: span in read mode, input in edit mode -->
                  <div class="shrink-0 flex items-center gap-1.5" @click.stop>
                    <span x-show="editingTask !== task.id" class="text-xs font-mono"
                          :class="task.done ? 'text-cod-muted' : taskUrgencyColor(task)"
                          x-text="formatDate(task.deadlineDate)"></span>
                    <input x-show="editingTask === task.id" type="date" x-model="editTaskData.deadlineDate"
                           class="text-xs bg-transparent border-b border-cod-accent/40 outline-none py-0.5 text-cod-text font-mono focus:border-cod-accent transition-colors">
                    <!-- Action buttons: save, cancel, delete (only in edit mode) -->
                    <template x-if="editingTask === task.id">
                      <div class="flex items-center gap-0.5 ml-1">
                        <button @click="saveTask(task.id)" class="text-cod-muted hover:text-cod-green p-1 rounded-full hover:bg-cod-green/10 transition-colors" title="Enregistrer">
                          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                        </button>
                        <button @click.stop="editingTask = null" class="text-cod-muted hover:text-white p-1 rounded-full hover:bg-cod-border/50 transition-colors" title="Annuler">
                          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                        <!-- Delete with inline confirm -->
                        <template x-if="confirmingDelete !== task.id">
                          <button @click="confirmingDelete = task.id" class="text-cod-muted hover:text-cod-red p-1 rounded-full hover:bg-cod-red/10 transition-colors" title="Supprimer">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                          </button>
                        </template>
                        <template x-if="confirmingDelete === task.id">
                          <div class="flex items-center gap-0.5 text-xs">
                            <span class="text-cod-red font-medium">Sûr ?</span>
                            <button @click="deleteTask(task.id)" class="text-cod-red hover:text-red-400 p-1 rounded-full hover:bg-cod-red/10 transition-colors" title="Confirmer la suppression">
                              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                            </button>
                            <button @click="confirmingDelete = null" class="text-cod-muted hover:text-white p-1 rounded-full hover:bg-cod-border/50 transition-colors" title="Annuler">
                              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                          </div>
                        </template>
                      </div>
                    </template>
                  </div>
                </div>
              </template>

              <!-- Add task form -->
              <div x-show="addingTaskPhase === phase.id" class="mt-2 bg-cod-card/50 rounded p-3 space-y-2" @click.stop>
                <input type="text" x-model="newTask.text" placeholder="Description de la tâche"
                       @keydown.enter="if (newTask.text.trim()) createTask(phase.id)"
                       class="w-full bg-cod-dark border border-cod-border rounded px-2 py-1.5 text-sm text-cod-text">
                <div class="flex items-center gap-2">
                  <input type="date" x-model="newTask.deadlineDate" class="bg-cod-dark border border-cod-border rounded px-2 py-1 text-xs text-cod-text">
                  <input type="text" x-model="newTask.notes" placeholder="Notes (optionnel)" class="flex-1 bg-cod-dark border border-cod-border rounded px-2 py-1 text-xs text-cod-text">
                  <button @click="createTask(phase.id)" class="text-cod-muted hover:text-cod-green p-1.5 rounded-full hover:bg-cod-green/10 transition-colors" title="Ajouter">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                  </button>
                  <button @click="addingTaskPhase = null" class="text-cod-muted hover:text-white p-1.5 rounded-full hover:bg-cod-border/50 transition-colors" title="Annuler">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                  </button>
                </div>
              </div>

              <button x-show="addingTaskPhase !== phase.id"
                      @click.stop="cancelAllEditing(); addingTaskPhase = phase.id; newTask = { text: '', deadlineDate: '', notes: '', needsDecision: false }"
                      class="text-xs text-cod-muted hover:text-cod-accent mt-2 transition block w-full text-left px-2 py-1">
                + Ajouter une tâche
              </button>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- New phase form -->
    <div x-show="creatingPhase" class="mt-4 bg-cod-card rounded-lg border border-cod-border p-4 space-y-3" @click.stop>
      <h3 class="text-sm font-semibold text-white">Nouvelle phase</h3>
      <div class="flex gap-3 items-end">
        <div class="flex-1">
          <label class="text-xs text-cod-muted block mb-1">Nom</label>
          <input type="text" x-model="newPhase.name" placeholder="ex: 1 — Production" class="w-full bg-cod-dark border border-cod-border rounded px-2 py-1.5 text-sm text-cod-text">
        </div>
        <div class="w-40">
          <label class="text-xs text-cod-muted block mb-1">Période</label>
          <input type="text" x-model="newPhase.period" placeholder="ex: mars → mai" class="w-full bg-cod-dark border border-cod-border rounded px-2 py-1.5 text-sm text-cod-text">
        </div>
        <div class="flex-1">
          <label class="text-xs text-cod-muted block mb-1">Jalons</label>
          <input type="text" x-model="newPhase.milestones" placeholder="Résumé des jalons clés" class="w-full bg-cod-dark border border-cod-border rounded px-2 py-1.5 text-sm text-cod-text">
        </div>
        <button @click="createPhase()" class="text-cod-muted hover:text-cod-green p-1.5 rounded-full hover:bg-cod-green/10 transition-colors" title="Créer">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </button>
        <button @click="creatingPhase = false" class="text-cod-muted hover:text-white p-1.5 rounded-full hover:bg-cod-border/50 transition-colors" title="Annuler">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>

    <button x-show="phases.length > 0 && !creatingPhase"
            @click.stop="cancelAllEditing(); creatingPhase = true; newPhase = { name: '', period: '', milestones: '' }"
            class="mt-4 text-sm text-cod-muted hover:text-cod-accent transition">
      + Nouvelle phase
    </button>

    <!-- ══════════ JOURNAL DES DÉCISIONS ══════════ -->
    <div x-show="phases.length > 0" class="mt-8" @click.stop>
      <h2 class="text-lg font-semibold text-white mb-4">Journal des décisions</h2>
      <div class="bg-cod-card rounded-lg border border-cod-border divide-y divide-cod-border mb-4" x-show="decisionLog.length > 0">
        <template x-for="(entry, i) in decisionLog" :key="i">
          <div class="px-4 py-3 flex gap-4">
            <span class="text-xs text-cod-muted font-mono shrink-0" x-text="entry.date"></span>
            <span class="text-sm" x-text="entry.text"></span>
          </div>
        </template>
      </div>

      <div class="flex gap-2 items-center">
        <input type="text" x-model="newLogEntry" placeholder="Ajouter une entrée au journal..."
               @keydown.enter="addLogEntry()"
               class="flex-1 bg-cod-dark border border-cod-border rounded px-3 py-1.5 text-sm text-cod-text">
        <button @click="addLogEntry()" class="text-xs text-cod-accent hover:underline" x-show="newLogEntry.trim()">Ajouter</button>
      </div>
    </div>

  </main>

  <footer class="border-t border-cod-border px-6 py-4 mt-8" @click.stop>
    <div class="max-w-7xl mx-auto flex justify-between text-xs text-cod-muted">
      <span>Données synchronisées avec le serveur (data.json)</span>
      <span x-text="tasks.length + ' tâches · ' + phases.length + ' phases'"></span>
    </div>
  </footer>

<script>
function dashboard() {
  return {

    // ── Server data ───────────────────────────────────────

    phases: [],
    tasks: [],
    decisionLog: [],

    // ── UI-only state ─────────────────────────────────────

    openPhases: [],

    creatingPhase: false,
    editingPhase: null,
    editPhaseData: {},
    newPhase: { name: '', period: '', milestones: '' },

    addingTaskPhase: null,
    editingTask: null,
    editTaskData: {},
    confirmingDelete: null,
    newTask: { text: '', deadlineDate: '', notes: '', needsDecision: false },

    newLogEntry: '',

    // ── Cancel all editing ────────────────────────────────

    cancelAllEditing() {
      this.editingPhase = null;
      this.editingTask = null;
      this.addingTaskPhase = null;
      this.creatingPhase = false;
      this.confirmingDelete = null;
    },

    // ── Computed ──────────────────────────────────────────

    formatDate(dateStr) {
      if (!dateStr) return '';
      return new Date(dateStr + 'T00:00:00').toLocaleDateString(undefined, { day: 'numeric', month: 'long', year: 'numeric' });
    },

    get releaseDate() {
      const task = this.tasks.find(t => t.isReleaseDate);
      return task ? task.deadlineDate : '';
    },

    get formattedReleaseDate() {
      if (!this.releaseDate) return '';
      return this.formatDate(this.releaseDate);
    },

    get daysLeft() {
      if (!this.releaseDate) return 0;
      return Math.ceil((new Date(this.releaseDate) - new Date()) / 86400000);
    },

    get globalProgress() {
      if (!this.tasks.length) return 0;
      const done = this.tasks.filter(t => t.done).length;
      return Math.round(done / this.tasks.length * 100);
    },

    // ── Data loading ─────────────────────────────────────

    async loadData() {
      const res = await fetch('/api/data');
      const data = await res.json();
      this.phases = data.phases;
      this.tasks = data.tasks;
      this.decisionLog = data.decisionLog;
      this.rebuildNextTaskCache();
    },

    // ── API helpers ──────────────────────────────────────

    async api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch('/api/' + path, opts);
      return res.json();
    },

    // ── Phases ───────────────────────────────────────────

    async createPhase() {
      const phase = await this.api('POST', 'phases', this.newPhase);
      this.phases.push(phase);
      this.creatingPhase = false;
      this.newPhase = { name: '', period: '', milestones: '' };
    },

    async savePhase(id) {
      const { name, period, milestones } = this.editPhaseData;
      const updated = await this.api('PUT', `phases/${id}`, { name, period, milestones });
      const idx = this.phases.findIndex(p => p.id === id);
      if (idx >= 0) this.phases[idx] = updated;
      this.editingPhase = null;
    },

    async deletePhase(id) {
      if (this.confirmingDelete !== 'phase-' + id) {
        this.confirmingDelete = 'phase-' + id;
        return;
      }
      await this.api('DELETE', `phases/${id}`);
      this.phases = this.phases.filter(p => p.id !== id);
      this.tasks = this.tasks.filter(t => t.phase !== id);
      this.confirmingDelete = null;
      this.rebuildNextTaskCache();
    },

    // ── Tasks ────────────────────────────────────────────

    phaseTasks(phaseId) {
      return this.tasks
        .filter(t => t.phase === phaseId)
        .sort((a, b) => {
          if (!a.deadlineDate) return 1;
          if (!b.deadlineDate) return -1;
          return a.deadlineDate.localeCompare(b.deadlineDate);
        });
    },

    _nextTaskCache: {},

    rebuildNextTaskCache() {
      const map = {};
      for (const phase of this.phases) {
        map[phase.id] = this.tasks
          .filter(t => t.phase === phase.id && !t.done && t.deadlineDate)
          .sort((a, b) => new Date(a.deadlineDate) - new Date(b.deadlineDate))[0] || null;
      }
      this._nextTaskCache = map;
    },

    nextTask(phaseId) {
      return this._nextTaskCache[phaseId] ?? null;
    },

    async toggleTask(task) {
      task.done = !task.done;
      await this.api('PUT', `tasks/${task.id}`, { done: task.done });
      this.rebuildNextTaskCache();
    },

    async createTask(phaseId) {
      const payload = { ...this.newTask, phase: phaseId };
      if (payload.needsDecision) {
        payload.decisions = [{ status: 'open', notes: '' }];
      }
      delete payload.needsDecision;
      const task = await this.api('POST', 'tasks', payload);
      this.tasks.push(task);
      this.addingTaskPhase = null;
      this.newTask = { text: '', deadlineDate: '', notes: '', needsDecision: false };
      this.rebuildNextTaskCache();
    },

    async saveTask(id) {
      const { text, deadlineDate, notes, decisions } = this.editTaskData;
      const payload = { text, deadlineDate, notes, decisions: decisions || [] };
      const updated = await this.api('PUT', `tasks/${id}`, payload);
      const idx = this.tasks.findIndex(t => t.id === id);
      if (idx >= 0) this.tasks[idx] = updated;
      this.editingTask = null;
      this.rebuildNextTaskCache();
    },

    async deleteTask(id) {
      await this.api('DELETE', `tasks/${id}`);
      this.tasks = this.tasks.filter(t => t.id !== id);
      this.editingTask = null;
      this.confirmingDelete = null;
      this.rebuildNextTaskCache();
    },

    async updateTaskDecision(task, index, newStatus) {
      if (task.decisions[index].status === newStatus) return;
      task.decisions[index].status = newStatus;
      await this.api('PUT', `tasks/${task.id}`, { decisions: task.decisions });
    },

    // ── Decision helpers ─────────────────────────────────

    decisionIcon(status) {
      return { open: '◇', discussed: '◈', decided: '◆' }[status] || '◇';
    },

    phaseOpenDecisions(phaseId) {
      return this.tasks
        .filter(t => t.phase === phaseId && !t.done)
        .reduce((sum, t) => sum + (t.decisions || []).filter(d => d.status !== 'decided').length, 0);
    },

    // ── Decision log ─────────────────────────────────────

    async addLogEntry() {
      if (!this.newLogEntry.trim()) return;
      const entry = await this.api('POST', 'decision-log', { text: this.newLogEntry.trim() });
      this.decisionLog.push(entry);
      this.newLogEntry = '';
    },

    // ── Phase display helpers ────────────────────────────

    togglePhase(phaseId) {
      const idx = this.openPhases.indexOf(phaseId);
      if (idx >= 0) this.openPhases.splice(idx, 1);
      else this.openPhases.push(phaseId);
    },

    phaseDaysLeft(phaseId) {
      const next = this.nextTask(phaseId);
      if (!next) return Infinity;
      return Math.ceil((new Date(next.deadlineDate) - new Date()) / 86400000);
    },

    phaseCountdown(phaseId) {
      if (!this.nextTask(phaseId)) return '';
      const days = this.phaseDaysLeft(phaseId);
      if (days < 0) return 'J+' + Math.abs(days);
      if (days === 0) return 'Auj.';
      return 'J-' + days;
    },

    urgencyColor(phaseId) {
      const d = this.phaseDaysLeft(phaseId);
      if (d < 14) return 'text-cod-red';
      if (d < 30) return 'text-cod-orange';
      if (d < 60) return 'text-cod-accent';
      return 'text-cod-green';
    },

    urgencyBadge(phaseId) {
      const d = this.phaseDaysLeft(phaseId);
      if (d < 14) return 'bg-cod-red/20 text-cod-red';
      if (d < 30) return 'bg-cod-orange/20 text-cod-orange';
      if (d < 60) return 'bg-cod-accent/20 text-cod-accent';
      return 'bg-cod-green/20 text-cod-green';
    },

    phaseUrgencyGlow(phaseId) {
      if (!this.nextTask(phaseId)) return this.phaseTasks(phaseId).length ? 'urgency-glow-done' : '';
      const d = this.phaseDaysLeft(phaseId);
      if (d < 14) return 'urgency-glow-red';
      if (d < 30) return 'urgency-glow-orange';
      if (d < 60) return 'urgency-glow-yellow';
      return 'urgency-glow-green';
    },

    taskUrgencyColor(task) {
      if (!task.deadlineDate) return 'text-cod-muted';
      const d = Math.ceil((new Date(task.deadlineDate) - new Date()) / 86400000);
      if (d < 14) return 'text-cod-red';
      if (d < 30) return 'text-cod-orange';
      if (d < 60) return 'text-cod-accent';
      return 'text-cod-muted';
    },

    phaseProgress(phaseId) {
      const tasks = this.phaseTasks(phaseId);
      const done = tasks.filter(t => t.done).length;
      return tasks.length ? Math.round(done / tasks.length * 100) : 0;
    },

    phaseStats(phaseId) {
      const tasks = this.phaseTasks(phaseId);
      const done = tasks.filter(t => t.done).length;
      return done + '/' + tasks.length;
    },
  };
}
</script>

</body>
</html>
